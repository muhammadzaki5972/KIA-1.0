<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login SISKIA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #004a87; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 10px; background: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    #loader { display: none; text-align: center; margin-top: 15px; }
  </style>
</head>
<body>

  <div class="login-card text-center">
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/90/National_emblem_of_Indonesia_Garuda_Pancasila.svg" width="45" class="mb-3">
    <h4 class="fw-bold text-dark">Login SISKIA</h4>
    <p class="text-muted small mb-4">Panel Administrasi Komisi Informasi Aceh</p>
    
    <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="mb-3 text-start">
        <label class="form-label small fw-bold">Username</label>
        <input type="text" id="username" class="form-control" required>
      </div>
      <div class="mb-4 text-start">
        <label class="form-label small fw-bold">Password</label>
        <input type="password" id="password" class="form-control" required>
      </div>
      <button type="submit" id="btnSubmit" class="btn btn-primary w-100 fw-bold">MASUK</button>
    </form>
    
    <div id="loader">
      <div class="spinner-border text-primary spinner-border-sm" role="status"></div><span class="ms-2 small">Memverifikasi...</span>
    </div>
  </div>

  <script>
    // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI BAWAH INI
    const API_URL = "https://script.google.com/macros/s/AKfycbzRhUsBnmuopqxBM9gmIZR1VLrpXzvVB87PwYBF1fgCfKriw7R8hLP-py6fBVg0ECw/exec";

    function handleLogin(event) {
      event.preventDefault(); 
      
      const loader = document.getElementById('loader');
      const alertBox = document.getElementById('alertBox');
      const btnSubmit = document.getElementById('btnSubmit');
      
      loader.style.display = 'block';
      alertBox.classList.add('d-none');
      btnSubmit.disabled = true;
      
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      // Panggil API Google
      fetch(`${API_URL}?action=login&user=${user}&pass=${pass}`)
        .then(response => response.json())
        .then(data => {
          if (data.valid) {
            loader.innerHTML = '<div class="spinner-border text-success spinner-border-sm" role="status"></div><span class="ms-2 small text-success fw-bold">Login berhasil!</span>';
            // Arahkan ke file admin.html yang ada di Vercel
            window.location.href = "admin.html"; 
          } else {
            loader.style.display = 'none';
            btnSubmit.disabled = false;
            alertBox.innerText = 'Username atau password salah!';
            alertBox.classList.remove('d-none');
          }
        })
        .catch(error => {
          loader.style.display = 'none';
          btnSubmit.disabled = false;
          alertBox.innerText = 'Koneksi ke server gagal: ' + error.message;
          alertBox.classList.remove('d-none');
        });
    }
  </script>
</body>
</html>
