<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #004a87; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 10px; background: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    #loader { display: none; text-align: center; margin-top: 15px; }
  </style>
</head>
<body>
  
  <input type="hidden" id="appUrl" value="<?= ScriptApp.getService().getUrl() ?>">

  <div class="login-card text-center">
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/90/National_emblem_of_Indonesia_Garuda_Pancasila.svg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original" width="45" class="mb-3">
    <h4 class="fw-bold text-dark">Login SISKIA</h4>
    <p class="text-muted small mb-4">Panel Administrasi Komisi Informasi Aceh</p>
    
    <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="mb-3 text-start">
        <label class="form-label small fw-bold">Username</label>
        <input type="text" id="username" class="form-control" required>
      </div>
      <div class="mb-4 text-start">
        <label class="form-label small fw-bold">Password</label>
        <input type="password" id="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-bold">MASUK</button>
    </form>
    
    <div id="loader">
      <div class="spinner-border text-primary spinner-border-sm" role="status"></div><span class="ms-2 small">Memverifikasi...</span>
    </div>

    <div class="mt-4">
      <button type="button" onclick="window.top.location.href='<?= ScriptApp.getService().getUrl() ?>?p=index'" class="btn btn-outline-secondary btn-sm w-100 fw-bold">
        <i class="fa fa-arrow-left me-2"></i> Kembali ke Beranda Utama
      </button>
    </div>
  </div>

<script>
    function handleLogin(event) {
      event.preventDefault(); 
      
      const loader = document.getElementById('loader');
      const alertBox = document.getElementById('alertBox');
      const btnSubmit = document.querySelector('button[type="submit"]');
      
      loader.style.display = 'block';
      alertBox.classList.add('d-none');
      btnSubmit.disabled = true;
      
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      google.script.run
        .withSuccessHandler(isValid => {
          if (isValid) {
            loader.innerHTML = '<div class="spinner-border text-success spinner-border-sm" role="status"></div><span class="ms-2 small text-success fw-bold">Login berhasil! Membuka Dashboard...</span>';
            const baseUrl = document.getElementById('appUrl').value;
            window.top.location.href = baseUrl + "?p=admin"; 
          } else {
            loader.style.display = 'none';
            btnSubmit.disabled = false;
            alertBox.innerText = 'Username atau password salah!';
            alertBox.classList.remove('d-none');
          }
        })
        .withFailureHandler(error => {
          loader.style.display = 'none';
          btnSubmit.disabled = false;
          alertBox.innerText = 'Terjadi gangguan ke server: ' + error.message;
          alertBox.classList.remove('d-none');
        })
        .verifyLogin(user, pass);
    }
  </script>
</body>
</html>
