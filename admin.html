<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - SISKIA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { background-color: #f4f6f9; overflow-x: hidden; }
    #sidebar { min-height: 100vh; background-color: #212529; color: white; width: 250px; position: fixed; z-index: 1000; }
    #content { margin-left: 250px; width: calc(100% - 250px); padding: 20px; }
    .nav-link { color: #adb5bd; transition: 0.3s; cursor: pointer; }
    .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255, 255, 255, 0.1); border-radius: 5px; }
    #loaderOverlay {
      display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.8); z-index: 2000;
      justify-content: center; align-items: center;
    }
  </style>
</head>
<body>
  <div id="loaderOverlay">
    <div class="spinner-border text-dark" role="status" style="width: 3rem; height: 3rem;"></div>
  </div>

  <div id="sidebar" class="p-3">
    <div class="text-center mb-4 border-bottom pb-3">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/National_emblem_of_Indonesia_Garuda_Pancasila.svg/300px-National_emblem_of_Indonesia_Garuda_Pancasila.svg.png" width="50" class="mb-2">
      <h5 class="fw-bold mb-0">SISKIA ADMIN</h5>
      <small class="text-muted">Komisi Informasi Aceh</small>
    </div>
    <ul class="nav flex-column">
      <li class="nav-item mb-2">
        <a class="nav-link active" onclick="showPage('dashboard')"><i class="fa fa-tachometer-alt me-2"></i> Dashboard</a>
      </li>
      <li class="nav-item mb-2">
        <a class="nav-link text-white" onclick="showPage('data')"><i class="fa fa-folder-open me-2"></i> Data Sengketa</a>
      </li>
      <li class="nav-item mt-4">
        <a href="index.html" onclick="sessionStorage.clear()" class="btn btn-danger w-100 btn-sm fw-bold"><i class="fa fa-sign-out-alt me-2"></i> Logout</a>
      </li>
    </ul>
  </div>

  <div id="content">
    <div id="pageDashboard">
      <h3 class="fw-bold mb-4">Dashboard Utama</h3>
      <div class="row mb-4">
        <div class="col-md-4">
          <div class="card bg-primary text-white shadow-sm border-0">
            <div class="card-body text-center">
              <h6 class="text-uppercase mb-1">Total Sengketa Diregister</h6>
              <h2 class="display-5 fw-bold" id="statTotal">...</h2>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3">
          <h5 class="mb-0 fw-bold text-dark"><i class="fa fa-plus-circle text-primary me-2"></i> Input Register Baru</h5>
        </div>
        <div class="card-body p-4">
          <form id="perkaraForm" onsubmit="handleFormSubmit(event)">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold small">Nomor Registrasi Sengketa</label>
                <input type="text" name="nomor" class="form-control" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold small">Tanggal Registrasi</label>
                <input type="date" name="tanggal" class="form-control" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold small">Pemohon vs Termohon</label>
                <input type="text" name="pihak" class="form-control" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold small">Klasifikasi/Jenis</label>
                <select name="jenis" class="form-select">
                  <option>Regulasi</option>
                  <option>Anggaran</option>
                  <option>Kinerja</option>
                  <option>HGU</option>
                  <option>Amdal</option>
                  <option>Lingkungan</option>
                </select>
              </div>
              <div class="col-md-12 mb-4">
                <label class="form-label fw-bold small">Keterangan</label>
                <input type="text" name="status" class="form-control">
              </div>
            </div>
            <button type="submit" id="btnSubmit" class="btn btn-success px-5 fw-bold"><i class="fa fa-save me-2"></i> SIMPAN DATA KE DATABASE</button>
          </form>
          <div id="message" class="mt-3"></div>
        </div>
      </div>
    </div>

    <div id="pageDataSengketa" style="display:none;">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0">Manajemen Data Sengketa</h3>
        <button onclick="loadDataSengketa()" class="btn btn-outline-primary btn-sm fw-bold"><i class="fa fa-sync me-1"></i> Refresh</button>
      </div>
      <div class="card shadow-sm border-0 p-3">
        <div class="table-responsive">
          <table class="table table-hover align-middle border">
            <thead class="table-dark text-center">
              <tr>
                <th style="width: 15%;">No. Registrasi</th>
                <th style="width: 12%;">Tanggal</th>
                <th>Pemohon vs Termohon</th>
                <th style="width: 15%;">Jenis</th>
                <th style="width: 15%;">Status</th>
                <th style="width: 8%;">Aksi</th>
              </tr>
            </thead>
            <tbody id="adminTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // GANTI STRING DI BAWAH DENGAN URL WEB APP GAS ANDA
    const API_URL = "URL_WEB_APP_GAS_ANDA_DISINI";

    document.addEventListener("DOMContentLoaded", function() {
      // Basic auth check
      if (!sessionStorage.getItem("isLoggedIn")) {
        window.location.href = "index.html";
        return;
      }
      loadDashboardStats();
    });

    async function loadDashboardStats() {
      const loader = document.getElementById('loaderOverlay');
      try {
        const response = await fetch(`${API_URL}?action=getStats`);
        const data = await response.json();
        document.getElementById('statTotal').innerText = data.total;
      } catch (error) {
        document.getElementById('statTotal').innerText = "Error";
      } finally {
        loader.style.display = 'none';
      }
    }

    function showPage(pageId) {
      document.getElementById('pageDashboard').style.display = pageId === 'dashboard' ? 'block' : 'none';
      document.getElementById('pageDataSengketa').style.display = pageId === 'data' ? 'block' : 'none';
      
      const links = document.querySelectorAll('.nav-link');
      links.forEach(link => link.classList.remove('active'));
      event.currentTarget.classList.add('active');

      if (pageId === 'data') loadDataSengketa();
    }

    async function loadDataSengketa() {
      const loader = document.getElementById('loaderOverlay');
      loader.style.display = 'flex';
      
      try {
        const response = await fetch(`${API_URL}?action=getTableData`);
        const data = await response.json();
        
        let html = '';
        data.forEach((row, index) => {
          let rowIndex = index + 2; 
          html += `
            <tr>
              <td><input type="text" id="no_${rowIndex}" class="form-control form-control-sm text-center fw-bold" value="${row}"></td>
              <td><input type="text" id="tgl_${rowIndex}" class="form-control form-control-sm text-center" value="${row[1]}"></td>
              <td><textarea id="ph_${rowIndex}" class="form-control form-control-sm" rows="1">${row[3]}</textarea></td>
              <td><input type="text" id="jn_${rowIndex}" class="form-control form-control-sm" value="${row[2]}"></td>
              <td><input type="text" id="st_${rowIndex}" class="form-control form-control-sm" value="${row[4]}"></td>
              <td class="text-center">
                <button onclick="updateRow(${rowIndex})" class="btn btn-success btn-sm"><i class="fa fa-save"></i></button>
              </td>
            </tr>`;
        });
        document.getElementById('adminTableBody').innerHTML = html;
      } catch (err) {
        alert("Gagal memuat data: " + err.message);
      } finally {
        loader.style.display = 'none';
      }
    }

    async function updateRow(index) {
      const loader = document.getElementById('loaderOverlay');
      loader.style.display = 'flex';
      
      const rowData = [
        document.getElementById('no_' + index).value,
        document.getElementById('tgl_' + index).value,
        document.getElementById('jn_' + index).value,
        document.getElementById('ph_' + index).value,
        document.getElementById('st_' + index).value
      ];
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'updateRow', index: index, rowData: rowData })
        });
        const res = await response.json();
        alert("Data baris " + index + " diperbarui!");
      } catch (err) {
        alert("Error: " + err.message);
      } finally {
        loader.style.display = 'none';
      }
    }

    async function handleFormSubmit(event) {
      event.preventDefault();
      const form = document.getElementById('perkaraForm');
      const btnSubmit = document.getElementById('btnSubmit');
      const loader = document.getElementById('loaderOverlay');

      const dataKirim = {
        nomor: form.nomor.value,
        tanggal: form.tanggal.value,
        pihak: form.pihak.value,
        jenis: form.jenis.value,
        status: form.status.value
      };

      btnSubmit.disabled = true;
      loader.style.display = 'flex';

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'processForm', payload: dataKirim })
        });
        const res = await response.json();
        
        document.getElementById('message').innerHTML = `<div class="alert alert-success fw-bold"><i class="fa fa-check-circle me-2"></i> ${res.message || res}</div>`;
        if (res.total !== undefined) document.getElementById('statTotal').innerText = res.total;
        form.reset();
      } catch (error) {
        alert("Error: " + error.message);
      } finally {
        loader.style.display = 'none';
        btnSubmit.disabled = false;
      }
    }
  </script>
</body>
</html>
